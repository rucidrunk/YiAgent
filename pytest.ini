[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that need real Redis/PostgreSQL
    edge: extreme boundary condition tests
    asyncio: marks async tests
asyncio_mode = auto
